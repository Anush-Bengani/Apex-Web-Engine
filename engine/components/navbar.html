<!-- ============================================================
     FILE: components/navbar.html
     Aura Design System — Navbar Component
     Requires: css/tokens.css, css/typography.css, css/components.css
     Usage: Replace [LOGO], [NAV_LINKS], [CTA_TEXT] with config values
     ============================================================ -->

<header class="navbar" role="banner" id="site-navbar">
  <div class="navbar__inner container">

    <!-- Logo -->
    <a href="/" class="navbar__logo" aria-label="Home">
      <span class="navbar__logo-mark" aria-hidden="true"></span>
      <span class="navbar__logo-text t-h3">[BRAND_NAME]</span>
    </a>

    <!-- Primary Navigation -->
    <nav class="navbar__nav" role="navigation" aria-label="Primary navigation">
      <ul class="navbar__links list-none" role="list">
        <li><a href="#" class="navbar__link">Home</a></li>
        <li class="navbar__item--dropdown">
          <a href="#" class="navbar__link navbar__link--has-dropdown" aria-haspopup="true" aria-expanded="false">
            Services
            <svg class="navbar__chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <ul class="navbar__dropdown" role="list">
            <li><a href="#" class="navbar__dropdown-link">Service One</a></li>
            <li><a href="#" class="navbar__dropdown-link">Service Two</a></li>
            <li><a href="#" class="navbar__dropdown-link">Service Three</a></li>
          </ul>
        </li>
        <li><a href="#" class="navbar__link">About</a></li>
        <li><a href="#" class="navbar__link">Gallery</a></li>
        <li><a href="#" class="navbar__link">Contact</a></li>
      </ul>
    </nav>

    <!-- CTA -->
    <div class="navbar__actions">
      <a href="#contact" class="btn btn--primary btn--sm">[CTA_TEXT]</a>
    </div>

    <!-- Mobile Hamburger -->
    <button
      class="navbar__hamburger"
      aria-label="Toggle navigation"
      aria-controls="mobile-menu"
      aria-expanded="false"
    >
      <span class="navbar__hamburger-bar"></span>
      <span class="navbar__hamburger-bar"></span>
      <span class="navbar__hamburger-bar"></span>
    </button>

  </div>

  <!-- Mobile Menu -->
  <div class="navbar__mobile" id="mobile-menu" aria-hidden="true">
    <nav aria-label="Mobile navigation">
      <ul class="navbar__mobile-links list-none" role="list">
        <li><a href="#" class="navbar__mobile-link">Home</a></li>
        <li><a href="#" class="navbar__mobile-link">Services</a></li>
        <li><a href="#" class="navbar__mobile-link">About</a></li>
        <li><a href="#" class="navbar__mobile-link">Gallery</a></li>
        <li><a href="#" class="navbar__mobile-link">Contact</a></li>
      </ul>
      <a href="#contact" class="btn btn--accent" style="width:100%;justify-content:center;">[CTA_TEXT]</a>
    </nav>
  </div>
</header>

<script>
(function() {
  const navbar    = document.getElementById('site-navbar');
  const hamburger = navbar.querySelector('.navbar__hamburger');
  const mobileMenu = document.getElementById('mobile-menu');
  const dropdownTriggers = navbar.querySelectorAll('.navbar__link--has-dropdown');

  // Scroll: add .is-scrolled after 40px
  const handleScroll = () => {
    navbar.classList.toggle('is-scrolled', window.scrollY > 40);
  };
  window.addEventListener('scroll', handleScroll, { passive: true });
  handleScroll();

  // Hamburger toggle
  hamburger.addEventListener('click', () => {
    const expanded = hamburger.getAttribute('aria-expanded') === 'true';
    hamburger.setAttribute('aria-expanded', !expanded);
    hamburger.classList.toggle('is-active');
    mobileMenu.classList.toggle('is-open');
    mobileMenu.setAttribute('aria-hidden', expanded);
    document.body.classList.toggle('nav-open', !expanded);
  });

  // Dropdown hover+focus behaviour
  dropdownTriggers.forEach(trigger => {
    const item = trigger.closest('.navbar__item--dropdown');
    trigger.addEventListener('click', (e) => {
      e.preventDefault();
      const expanded = trigger.getAttribute('aria-expanded') === 'true';
      trigger.setAttribute('aria-expanded', !expanded);
      item.classList.toggle('is-open');
    });
  });

  // Close dropdown on outside click
  document.addEventListener('click', (e) => {
    if (!navbar.contains(e.target)) {
      dropdownTriggers.forEach(t => {
        t.setAttribute('aria-expanded', 'false');
        t.closest('.navbar__item--dropdown').classList.remove('is-open');
      });
    }
  });

  // Close mobile menu on resize
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) {
      hamburger.setAttribute('aria-expanded', 'false');
      hamburger.classList.remove('is-active');
      mobileMenu.classList.remove('is-open');
      mobileMenu.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('nav-open');
    }
  });
})();
</script>
