<section class="section" aria-labelledby="contact-title">
  <div class="container">
    <div class="section__header animate-fade-up">
      <span class="section-label" data-content="contact.label"></span>
      <h2 class="section__title" id="contact-title" data-content="contact.title"></h2>
      <p class="section__subtitle" data-content="contact.subtitle"></p>
    </div>
    <div class="contact-form__layout animate-fade-up">
      <div class="contact-form__info">
        <h3 class="contact-form__info-title">We Would Love to Hear From You</h3>
        <p class="contact-form__info-sub">Whether you are planning a short getaway, a luxury suite stay, or a special event, our team is ready to help you create the perfect experience.</p>
        <div class="contact-info-item">
          <div class="contact-info-item__icon" data-content="contact.emailIcon"></div>
          <div>
            <div class="contact-info-item__label" data-content="contact.emailLabel"></div>
            <a class="contact-info-item__value contact-info-item__link" data-content="contact.emailValue" data-content-attr-href="contact.emailHref" href="mailto:info@serenitysandsresort.com"></a>
          </div>
        </div>
        <div class="contact-info-item">
          <div class="contact-info-item__icon" data-content="contact.phoneIcon"></div>
          <div>
            <div class="contact-info-item__label" data-content="contact.phoneLabel"></div>
            <a class="contact-info-item__value contact-info-item__link" data-content="contact.phoneValue" data-content-attr-href="contact.phoneHref" href="tel:+919876543210"></a>
          </div>
        </div>
        <div class="contact-info-item">
          <div class="contact-info-item__icon" data-content="contact.addressIcon"></div>
          <div>
            <div class="contact-info-item__label" data-content="contact.addressLabel"></div>
            <div class="contact-info-item__value" data-content="contact.addressValue"></div>
          </div>
        </div>
      </div>
      <div class="form-card">
        <div id="contact-form-content">
          <div class="form-row">
            <div class="form-field" id="field-cf-fname">
              <label class="form-label" for="cf-fname" data-content="contact.form.firstNameLabel"></label>
              <input class="form-input" type="text" id="cf-fname" data-content-attr-placeholder="contact.form.firstNamePlaceholder" placeholder="First name" data-error="Please enter your first name." required>
              <div class="form-error" id="err-cf-fname"></div>
            </div>
            <div class="form-field" id="field-cf-lname">
              <label class="form-label" for="cf-lname" data-content="contact.form.lastNameLabel"></label>
              <input class="form-input" type="text" id="cf-lname" data-content-attr-placeholder="contact.form.lastNamePlaceholder" placeholder="Last name" data-error="Please enter your last name." required>
              <div class="form-error" id="err-cf-lname"></div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field" id="field-cf-email">
              <label class="form-label" for="cf-email" data-content="contact.form.emailLabel"></label>
              <input class="form-input" type="email" id="cf-email" data-content-attr-placeholder="contact.form.emailPlaceholder" placeholder="Email address" data-error="Please enter a valid email." required>
              <div class="form-error" id="err-cf-email"></div>
            </div>
            <div class="form-field">
              <label class="form-label" for="cf-phone" data-content="contact.form.phoneLabel"></label>
              <input class="form-input" type="tel" id="cf-phone" data-content-attr-placeholder="contact.form.phonePlaceholder" placeholder="Phone number">
            </div>
          </div>
          <div class="form-field">
            <label class="form-label" for="cf-subject" data-content="contact.form.subjectLabel"></label>
            <select class="form-select" id="cf-subject">
              <option value="">Select an option...</option>
              <option data-content="contact.form.subjectOption1">Room Reservation</option>
              <option data-content="contact.form.subjectOption2">Spa and Wellness Booking</option>
              <option data-content="contact.form.subjectOption3">Event or Wedding Enquiry</option>
              <option data-content="contact.form.subjectOption4">General Enquiry</option>
            </select>
            <div class="form-hint" data-content="contact.form.subjectHint"></div>
          </div>
          <div class="form-field" id="field-cf-message">
            <label class="form-label" for="cf-message" data-content="contact.form.messageLabel"></label>
            <textarea class="form-textarea" id="cf-message" data-content-attr-placeholder="contact.form.messagePlaceholder" placeholder="Your message" data-error="Please enter your message." required></textarea>
            <div class="form-error" id="err-cf-message"></div>
          </div>
          <div class="form-consent">
            <input type="checkbox" id="cf-consent">
            <label class="form-consent-text" for="cf-consent" data-content="contact.form.consentText"></label>
          </div>
          <button class="btn btn--primary form-submit" id="contact-submit" type="button" data-content="contact.form.submitLabel">Send Enquiry</button>
        </div>
        <div class="form-success" id="contact-form-success">
          <div class="form-success__icon">&#10003;</div>
          <h3 class="form-success__title">Message Sent!</h3>
          <p class="form-success__sub">Thank you for reaching out. Our team will get back to you within 24 hours.</p>
        </div>
      </div>
    </div>
  </div>
</section>
