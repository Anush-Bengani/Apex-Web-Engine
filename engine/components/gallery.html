<!-- Lightbox overlay (activates on gallery item click) -->

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" hidden>
  <button class="lightbox__close btn btn--ghost" aria-label="Close image viewer">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
  <div class="lightbox__content">
    <img src="" alt="" class="lightbox__img" id="lightbox-img">
    <p class="lightbox__caption t-caption" id="lightbox-caption"></p>
  </div>
  <button class="lightbox__prev" aria-label="Previous image">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M15 4l-8 8 8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="lightbox__next" aria-label="Next image">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M9 4l8 8-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
</div>

<script>
(function() {
  const lightbox = document.getElementById('lightbox');
  const lbImg    = document.getElementById('lightbox-img');
  const lbCap    = document.getElementById('lightbox-caption');
  const items    = document.querySelectorAll('.gallery__item:not(.gallery__item--more), .gallery__grid-item');

  function openLightbox(img, caption) {
    lbImg.src = img.src;
    lbImg.alt = img.alt;
    lbCap.textContent = caption || img.alt;
    lightbox.hidden = false;
    document.body.style.overflow = 'hidden';
    lightbox.querySelector('.lightbox__close').focus();
  }

  function closeLightbox() {
    lightbox.hidden = true;
    document.body.style.overflow = '';
  }

  items.forEach(item => {
    item.style.cursor = 'pointer';
    item.addEventListener('click', () => {
      const img = item.querySelector('img');
      const cap = item.querySelector('.t-label')?.textContent;
      openLightbox(img, cap);
    });
  });

  lightbox.querySelector('.lightbox__close').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
})();
</script>
