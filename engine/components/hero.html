<section class="hero" aria-labelledby="hero-title">
  <div class="hero__bg" aria-hidden="true">
    <div class="hero__bg-glow"></div>
    <div class="hero__bg-glow-2"></div>
    <div class="hero__bg-grid"></div>
  </div>
  <div class="hero__inner container">
    <div class="hero__content animate-fade-up">
      <span class="hero__label" data-content="hero.label"></span>
      <h1 class="hero__title" id="hero-title" data-content="hero.title"></h1>
      <p class="hero__subtitle lead" data-content="hero.subtitle"></p>
      <div class="hero__actions btn-group">
        <a class="btn btn--primary btn--lg" data-content="hero.primaryCtaLabel" data-content-attr-href="hero.primaryCtaUrl" href="index.html?page=contact"></a>
        <a class="btn btn--secondary btn--lg" data-content="hero.secondaryCtaLabel" data-content-attr-href="hero.secondaryCtaUrl" href="index.html?page=rooms"></a>
      </div>
      <div class="hero__stats">
        <div class="hero__stat"><div class="hero__stat-value" data-content="hero.stat1Value"></div><div class="hero__stat-label" data-content="hero.stat1Label"></div></div>
        <div class="hero__stat"><div class="hero__stat-value" data-content="hero.stat2Value"></div><div class="hero__stat-label" data-content="hero.stat2Label"></div></div>
        <div class="hero__stat"><div class="hero__stat-value" data-content="hero.stat3Value"></div><div class="hero__stat-label" data-content="hero.stat3Label"></div></div>
      </div>
    </div>
    <div class="hero__visual animate-scale-in delay-2">
      <div class="hero__img-wrap"><div class="hero__img-placeholder">🏖</div></div>
      <div class="hero__badge">
        <div class="hero__badge-label">Direct Booking Offer</div>
        <div class="hero__badge-value">Save 15%</div>
      </div>
    </div>
  </div>
</section>
