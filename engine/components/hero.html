<div class="hero__content animate-fade-up">

  <span class="hero__label" data-content="hero.label"></span>

  <h1
    class="hero__title"
    id="hero-title"
    data-content="hero.title"
  ></h1>

  <p
    class="hero__subtitle lead"
    data-content="hero.subtitle"
  ></p>

  <div class="hero__actions btn-group">
    <a
      class="btn btn--primary btn--lg"
      data-content="hero.primaryCtaLabel"
      data-content-attr-href="hero.primaryCtaUrl"
      href="#"
    ></a>
    <a
      class="btn btn--secondary btn--lg"
      data-content="hero.secondaryCtaLabel"
      data-content-attr-href="hero.secondaryCtaUrl"
      href="#"
    ></a>
  </div>

  <dl class="hero__stats" aria-label="Key statistics">
    <div class="hero__stat">
      <dt class="hero__stat-label" data-content="hero.stat1Label"></dt>
      <dd class="hero__stat-value" data-content="hero.stat1Value"></dd>
    </div>
    <div class="hero__stat">
      <dt class="hero__stat-label" data-content="hero.stat2Label"></dt>
      <dd class="hero__stat-value" data-content="hero.stat2Value"></dd>
    </div>
    <div class="hero__stat">
      <dt class="hero__stat-label" data-content="hero.stat3Label"></dt>
      <dd class="hero__stat-value" data-content="hero.stat3Value"></dd>
    </div>
  </dl>

</div>

<div class="hero__visual animate-fade-in delay-2" aria-hidden="true">
  <img
    class="hero__media"
    data-content="hero.imageUrl"
    data-content-attr="src"
    data-content-attr-alt="hero.imageAlt"
    src=""
    alt=""
    width="600"
    height="500"
    loading="eager"
  />
</div>
